<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Elo</title>
</head>
<body>

<h1>Sports Elo</h1>

<h2>NBA Elo Ratings</h2>

<p>
    Last game:
    <span id="last-game">-</span>
</p>

<p>
    Games:
    <span id="games">-</span>
</p>

<hr>

<label for="date">Select date:</label>
<input type="date" id="date">

<button id="show-elo">Show Elo</button>

<p id="status">Loading...</p>

<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>Rank</th>
            <th>Team</th>
            <th>Elo</th>
        </tr>
    </thead>

    <tbody id="rankings"></tbody>

</table>

<script>

let historicalData = null;

function renderRankings(rankings) {

    const tbody = document.getElementById("rankings");

    tbody.innerHTML = "";

    rankings.forEach(team => {

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${team.rank}</td>
            <td>${team.team_name}</td>
            <td>${Number(team.elo).toFixed(1)}</td>
        `;

        tbody.appendChild(row);

    });

}

async function loadMetadata() {

    const response = await fetch("/data/nba/metadata.json");
    const metadata = await response.json();

    document.getElementById("games").textContent =
        metadata.games.toLocaleString();

    document.getElementById("last-game").textContent =
        metadata.last_game_date;

    document.getElementById("date").value =
        metadata.last_game_date;

}

async function loadCurrentRankings() {

    const response =
        await fetch("/data/nba/rankings.json");

    const rankings =
        await response.json();

    renderRankings(rankings);

    document.getElementById("status").textContent =
        "Showing current Elo ratings.";

}

async function loadHistoricalFile() {

    const response =
        await fetch("/data/nba/nba_elo_by_date.json");

    historicalData =
        await response.json();

}

function showHistoricalRatings() {

    const selectedDate =
        document.getElementById("date").value;

    if (!selectedDate) {

        alert("Please choose a date.");

        return;

    }

    const rankings =
        historicalData[selectedDate];

    if (!rankings) {

        document.getElementById("status").textContent =
            `No data for ${selectedDate}.`;

        document.getElementById("rankings").innerHTML = "";

        return;

    }

    renderRankings(rankings);

    document.getElementById("status").textContent =
        `Showing Elo ratings for ${selectedDate}.`;

}

document
    .getElementById("show-elo")
    .addEventListener("click", showHistoricalRatings);

async function init() {

    await loadMetadata();

    await loadCurrentRankings();

    await loadHistoricalFile();

}

init();

</script>

</body>
</html>
