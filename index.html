<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Elo</title>
</head>
<body>

<h1>Sports Elo</h1>
<h2>NBA Elo Ratings</h2>

<p>
  Last game: <span id="last-game">-</span><br>
  Games: <span id="games">-</span>
</p>

<label>Year:
  <input id="year" type="number" min="1946">
</label>

<label>Month:
  <input id="month" type="number" min="1" max="12">
</label>

<label>Day:
  <input id="day" type="number" min="1" max="31">
</label>

<button id="show-elo">Show Elo</button>

<p id="status">Loading...</p>

<table border="1" cellpadding="8">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Team</th>
      <th>Elo</th>
    </tr>
  </thead>
  <tbody id="rankings"></tbody>
</table>

<script>
let metadata = null;
let teams = [];
let historicalData = null;

async function fetchJson(path) {
  const response = await fetch(path);

  if (!response.ok) {
    throw new Error("Could not load " + path);
  }

  return await response.json();
}

function activeTeamIds() {
  return new Set(
    teams
      .filter(team => team.active === true)
      .map(team => team.team_id)
  );
}

function filterCurrentTeams(rankings) {
  const activeIds = activeTeamIds();

  if (activeIds.size === 0) {
    return rankings;
  }

  return rankings
    .filter(team => activeIds.has(team.team_id))
    .map((team, index) => ({
      ...team,
      rank: index + 1
    }));
}

function renderRankings(rankings) {
  const tbody = document.getElementById("rankings");
  tbody.innerHTML = "";

  rankings.forEach(team => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${team.rank}</td>
      <td>${team.team_name}</td>
      <td>${Number(team.elo).toFixed(1)}</td>
    `;

    tbody.appendChild(row);
  });
}

async function loadMetadata() {
  metadata = await fetchJson("/data/nba/metadata.json");

  document.getElementById("last-game").textContent = metadata.last_game_date;
  document.getElementById("games").textContent = metadata.games.toLocaleString();

  const parts = metadata.last_game_date.split("-");

  document.getElementById("year").value = parts[0];
  document.getElementById("month").value = Number(parts[1]);
  document.getElementById("day").value = Number(parts[2]);
}

async function loadTeams() {
  try {
    teams = await fetchJson("/data/nba/nba_teams.json");
  } catch (error) {
    teams = [];
  }
}

async function loadCurrentRankings() {
  const rankings = await fetchJson("/data/nba/rankings.json");
  const filtered = filterCurrentTeams(rankings);

  renderRankings(filtered);

  document.getElementById("status").textContent =
    "Showing current NBA Elo ratings.";
}

async function showEloForDate() {
  const year = document.getElementById("year").value;
  const month = String(document.getElementById("month").value).padStart(2, "0");
  const day = String(document.getElementById("day").value).padStart(2, "0");

  const selectedDate = `${year}-${month}-${day}`;

  document.getElementById("status").textContent =
    "Loading historical Elo ratings...";

  if (!historicalData) {
    historicalData = await fetchJson("/data/nba/nba_elo_by_date.json");
  }

  const rankings = historicalData[selectedDate];

  if (!rankings) {
    renderRankings([]);
    document.getElementById("status").textContent =
      `No Elo data for ${selectedDate}.`;
    return;
  }

  renderRankings(rankings);

  document.getElementById("status").textContent =
    `Showing NBA Elo ratings for ${selectedDate}.`;
}

document
  .getElementById("show-elo")
  .addEventListener("click", showEloForDate);

async function init() {
  try {
    await loadMetadata();
    await loadTeams();
    await loadCurrentRankings();
  } catch (error) {
    document.getElementById("status").textContent =
      "Error: " + error.message;
  }
}

init();
</script>

</body>
</html>
